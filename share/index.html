<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Open a MapCrumbs share link" />
    <title>MapCrumbs Share</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header class="brand">
        <img
          class="brand-logo"
          src="assets/app-logo.png"
          width="48"
          height="56"
          alt=""
        />
        <h1>MapCrumbs</h1>
        <p id="brand-tagline">Open this share in MapCrumbs</p>
      </header>

      <section class="card" aria-live="polite">
        <p id="preview-label" class="preview-label">Shared link</p>
        <h2 id="preview-title" class="preview-title">Waiting for you in the app</h2>
        <p id="preview-subtitle" class="preview-subtitle">
          Install MapCrumbs to view this place, city, or live journey.
        </p>

        <div class="actions">
          <a id="store-ios" class="store-btn" href="#">Get MapCrumbs</a>
        </div>

        <p id="footnote" class="footnote"></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
