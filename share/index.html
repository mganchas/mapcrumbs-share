<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Open a MapCrumbs share link" />
    <title>MapCrumbs Share</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header class="brand">
        <div class="logo" aria-hidden="true">MC</div>
        <div>
          <h1>MapCrumbs</h1>
          <p>Someone shared something with you</p>
        </div>
      </header>

      <section class="card" aria-live="polite">
        <p id="preview-label" class="preview-label">Shared link</p>
        <h2 id="preview-title" class="preview-title">Open in MapCrumbs</h2>
        <p id="preview-subtitle" class="preview-subtitle">
          Install the app to view this place, city, or live journey.
        </p>

        <div class="actions">
          <a id="store-ios" class="store-btn primary" href="#">Get on the App Store</a>
          <a id="store-android" class="store-btn" href="#">Get on Google Play</a>
        </div>

        <p id="footnote" class="footnote"></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
